blueprint:
  name: MELCloud day/night schedule with window shutdown
  description: >
    Control a MELCloud climate entity with a custom day/night schedule and
    window-open protection.

    Features:
    - Enable or disable day and night schedules independently
    - Define separate day and night weekdays and start/end times
    - Define separate day and night start/stop/target temperatures
    - Turn the unit off when everyone is away
    - Resume schedule control when someone is home
    - Optionally set a setback / stop temperature when a window group opens
    - Optionally turn the unit off while the window group is open
    - Reapply the correct scheduled target when the window group closes

    Create a binary sensor group for your windows first, then use that group as
    the window input for this blueprint.
  domain: automation
  author: GitHub Copilot
  homeassistant:
    min_version: 2024.6.0
  input:
    device_config:
      name: Device
      icon: mdi:air-conditioner
      input:
        climate_entity:
          name: MELCloud climate entity
          selector:
            entity:
              filter:
                domain: climate
        scheduled_hvac_mode:
          name: HVAC mode to use when schedule applies
          default: heat
          selector:
            select:
              options:
                - label: Heat
                  value: heat
                - label: Cool
                  value: cool
                - label: Auto
                  value: auto
                - label: Heat/Cool
                  value: heat_cool
                - label: Dry
                  value: dry
                - label: Fan only
                  value: fan_only
              mode: dropdown
    schedule_config:
      name: Day / night schedule
      icon: mdi:clock-outline
      input:
        day_schedule_enabled:
          name: Enable day schedule
          default: true
          selector:
            boolean: {}
        day_weekdays:
          name: Day weekdays
          default:
            - mon
            - tue
            - wed
            - thu
            - fri
            - sat
            - sun
          selector:
            select:
              options:
                - label: Monday
                  value: mon
                - label: Tuesday
                  value: tue
                - label: Wednesday
                  value: wed
                - label: Thursday
                  value: thu
                - label: Friday
                  value: fri
                - label: Saturday
                  value: sat
                - label: Sunday
                  value: sun
              multiple: true
              mode: dropdown
        day_start_time:
          name: Day start time
          default: "06:00:00"
          selector:
            time: {}
        day_end_time:
          name: Day end time
          default: "22:00:00"
          selector:
            time: {}
        day_start_temperature:
          name: Day start temperature
          default: 21
          selector:
            number:
              min: 5
              max: 31
              step: 0.5
              mode: box
              unit_of_measurement: "°C"
        day_stop_temperature:
          name: Day stop temperature
          default: 19
          selector:
            number:
              min: 5
              max: 31
              step: 0.5
              mode: box
              unit_of_measurement: "°C"
        day_target_temperature:
          name: Day target temperature
          default: 21
          selector:
            number:
              min: 5
              max: 31
              step: 0.5
              mode: box
              unit_of_measurement: "°C"
        night_schedule_enabled:
          name: Enable night schedule
          default: true
          selector:
            boolean: {}
        night_weekdays:
          name: Night weekdays
          default:
            - mon
            - tue
            - wed
            - thu
            - fri
            - sat
            - sun
          selector:
            select:
              options:
                - label: Monday
                  value: mon
                - label: Tuesday
                  value: tue
                - label: Wednesday
                  value: wed
                - label: Thursday
                  value: thu
                - label: Friday
                  value: fri
                - label: Saturday
                  value: sat
                - label: Sunday
                  value: sun
              multiple: true
              mode: dropdown
        night_start_time:
          name: Night start time
          default: "22:00:00"
          selector:
            time: {}
        night_end_time:
          name: Night end time
          default: "06:00:00"
          selector:
            time: {}
        night_start_temperature:
          name: Night start temperature
          default: 18
          selector:
            number:
              min: 5
              max: 31
              step: 0.5
              mode: box
              unit_of_measurement: "°C"
        night_stop_temperature:
          name: Night stop temperature
          default: 17
          selector:
            number:
              min: 5
              max: 31
              step: 0.5
              mode: box
              unit_of_measurement: "°C"
        night_target_temperature:
          name: Night target temperature
          default: 18
          selector:
            number:
              min: 5
              max: 31
              step: 0.5
              mode: box
              unit_of_measurement: "°C"
    presence_config:
      name: Presence
      icon: mdi:account-group
      input:
        people_entities:
          name: People to track
          description: Turn off when all selected people are away, and run schedule when someone is home. Leave empty to disable presence control.
          selector:
            entity:
              filter:
                domain: person
              multiple: true
    window_config:
      name: Window protection
      icon: mdi:window-open-variant
      input:
        window_group:
          name: Window group binary sensor
          description: Use a binary sensor group that is `on` when any window is open.
          selector:
            entity:
              filter:
                domain: binary_sensor
        set_window_temp_on_open:
          name: Set stop / setback temperature when windows open
          default: true
          selector:
            boolean: {}
        window_open_temperature:
          name: Window-open stop / setback temperature
          default: 16
          selector:
            number:
              min: 5
              max: 31
              step: 0.5
              mode: box
              unit_of_measurement: "°C"
        shutdown_on_window_open:
          name: Turn the unit off while windows are open
          default: true
          selector:
            boolean: {}

mode: restart
max_exceeded: silent

triggers:
  - trigger: homeassistant
    event: start
    id: startup

  - trigger: time
    at: !input day_start_time
    id: day_start

  - trigger: time
    at: !input day_end_time
    id: day_end

  - trigger: time
    at: !input night_start_time
    id: night_start

  - trigger: time
    at: !input night_end_time
    id: night_end

  - trigger: state
    entity_id: !input people_entities
    id: presence_change

  - trigger: state
    entity_id: !input window_group
    to: "on"
    id: window_open

  - trigger: state
    entity_id: !input window_group
    to: "off"
    id: window_closed

variables:
  climate_entity: !input climate_entity
  window_group: !input window_group
  scheduled_hvac_mode: !input scheduled_hvac_mode
  day_schedule_enabled: !input day_schedule_enabled
  day_weekdays: !input day_weekdays
  day_start_time: !input day_start_time
  day_end_time: !input day_end_time
  day_start_temperature: !input day_start_temperature
  day_stop_temperature: !input day_stop_temperature
  day_target_temperature: !input day_target_temperature
  night_schedule_enabled: !input night_schedule_enabled
  night_weekdays: !input night_weekdays
  night_start_time: !input night_start_time
  night_end_time: !input night_end_time
  night_start_temperature: !input night_start_temperature
  night_stop_temperature: !input night_stop_temperature
  night_target_temperature: !input night_target_temperature
  people_entities: !input people_entities
  set_window_temp_on_open: !input set_window_temp_on_open
  window_open_temperature: !input window_open_temperature
  shutdown_on_window_open: !input shutdown_on_window_open
  windows_open: "{{ is_state(window_group, 'on') }}"
  tracked_people_count: "{{ expand(people_entities) | list | count }}"
  presence_enabled: "{{ tracked_people_count > 0 }}"
  home_people_count: "{{ expand(people_entities) | selectattr('state', 'eq', 'home') | list | count }}"
  someone_home: "{{ (not presence_enabled) or home_people_count > 0 }}"
  everyone_away: "{{ presence_enabled and home_people_count == 0 }}"
  trigger_id: "{{ trigger.id if trigger is defined else 'startup' }}"
  current_weekday: "{{ now().strftime('%a') | lower }}"
  is_day_weekday: "{{ current_weekday in day_weekdays }}"
  is_night_weekday: "{{ current_weekday in night_weekdays }}"
  current_time: "{{ now().strftime('%H:%M:%S') }}"
  is_day_time: >-
    {% if day_start_time < day_end_time %}
      {{ day_start_time <= current_time < day_end_time }}
    {% else %}
      {{ current_time >= day_start_time or current_time < day_end_time }}
    {% endif %}
  is_night_time: >-
    {% if night_start_time < night_end_time %}
      {{ night_start_time <= current_time < night_end_time }}
    {% else %}
      {{ current_time >= night_start_time or current_time < night_end_time }}
    {% endif %}
  is_day_period: "{{ day_schedule_enabled and is_day_weekday and is_day_time }}"
  is_night_period: "{{ night_schedule_enabled and is_night_weekday and is_night_time }}"
  scheduled_temperature: >-
    {% if is_day_period %}
      {{ day_target_temperature }}
    {% elif is_night_period %}
      {{ night_target_temperature }}
    {% else %}
      {{ '' }}
    {% endif %}
  transition_temperature: >-
    {% if trigger_id == 'day_start' and day_schedule_enabled and is_day_weekday %}
      {{ day_start_temperature }}
    {% elif trigger_id == 'day_end' and day_schedule_enabled and is_day_weekday %}
      {{ day_stop_temperature }}
    {% elif trigger_id == 'night_start' and night_schedule_enabled and is_night_weekday %}
      {{ night_start_temperature }}
    {% elif trigger_id == 'night_end' and night_schedule_enabled and is_night_weekday %}
      {{ night_stop_temperature }}
    {% else %}
      {{ '' }}
    {% endif %}
  requested_temperature: "{{ transition_temperature if transition_temperature != '' else scheduled_temperature }}"

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ everyone_away }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input climate_entity
            data:
              hvac_mode: "off"

      - conditions:
          - condition: template
            value_template: "{{ someone_home and windows_open }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ set_window_temp_on_open }}"
                sequence:
                  - action: climate.set_temperature
                    target:
                      entity_id: !input climate_entity
                    data:
                      temperature: "{{ window_open_temperature | float }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ shutdown_on_window_open }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: !input climate_entity
                    data:
                      hvac_mode: "off"

      - conditions:
          - condition: template
            value_template: "{{ someone_home and requested_temperature != '' }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input climate_entity
            data:
              hvac_mode: !input scheduled_hvac_mode
          - action: climate.set_temperature
            target:
              entity_id: !input climate_entity
            data:
              temperature: "{{ requested_temperature | float }}"
